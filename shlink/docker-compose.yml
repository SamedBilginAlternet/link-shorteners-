services:
  shlink:
    image: shlinkio/shlink:stable
    container_name: shlink
    restart: unless-stopped
    environment:
      DEFAULT_DOMAIN: ${SHLINK_DOMAIN}
      IS_HTTPS_ENABLED: ${SHLINK_HTTPS}
      DB_DRIVER: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: shlink_db
      INITIAL_API_KEY: ${SHLINK_API_KEY}
    depends_on:
      shlink_db:
        condition: service_healthy

  shlink_db:
    image: postgres:16-alpine
    container_name: shlink_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - shlink_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  shlink_web:
    image: shlinkio/shlink-web-client:stable
    container_name: shlink_web
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: shlink_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      NGINX_USER: ${NGINX_USER}
      NGINX_PASS: ${NGINX_PASS}
    depends_on:
      - shlink
      - shlink_web

  shlink_kuma_bridge:
    build: ./bridge
    container_name: shlink_kuma_bridge
    restart: unless-stopped
    environment:
      SHLINK_API_URL: http://shlink:8080
      SHLINK_API_KEY: ${SHLINK_API_KEY}
      KUMA_URL: http://uptime_kuma:3001
      KUMA_USER: ${KUMA_USER}
      KUMA_PASS: ${KUMA_PASS}
      POLL_INTERVAL: ${POLL_INTERVAL:-60}
    depends_on:
      - shlink
      - uptime_kuma

  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

volumes:
  shlink_db_data:
  uptime_kuma_data:
