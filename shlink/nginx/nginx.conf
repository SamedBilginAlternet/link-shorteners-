events {}

http {
    # Shlink API + redirects (port 8080)
    # Short URL redirects are public, /rest/ is API-key protected by Shlink itself
    server {
        listen 8080;

        location / {
            proxy_pass http://shlink:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Shlink Web Dashboard (port 8081) — basic auth protected
    server {
        listen 8081;

        location / {
            auth_basic "Shlink Dashboard";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://shlink_web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
